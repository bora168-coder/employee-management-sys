spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: WARN
    com.yourapp: INFO

server:
  port: 8181

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

app:
  upload-path: /data/uploads