spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant
    username: username
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.yourapp: DEBUG

app:
  upload-path: ./uploads